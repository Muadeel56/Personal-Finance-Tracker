version: '3.8'

services:
  # Development Backend
  backend-dev:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: finance_backend_dev
    environment:
      - DEBUG=True
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key}
      - DATABASE_URL=postgres://${POSTGRES_USER:-finance_user}:${POSTGRES_PASSWORD:-finance_password}@db:5432/${POSTGRES_DB:-finance_db}
      - CORS_ALLOWED_ORIGINS=http://localhost:5173,http://localhost:3000
      - ALLOWED_HOSTS=localhost,127.0.0.1
    volumes:
      - ./backend:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8002:8000"
    depends_on:
      db:
        condition: service_healthy
    command: python manage.py runserver 0.0.0.0:8000
    networks:
      - finance_network

  # Development Frontend
  frontend-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: finance_frontend_dev
    environment:
      - REACT_APP_API_URL=http://localhost:8002
    volumes:
      - ./frontend/finance-frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend-dev
    command: npm run dev -- --host 0.0.0.0
    networks:
      - finance_network 