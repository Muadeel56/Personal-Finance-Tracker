server {
    listen 80;
    server_name localhost;

    # Serve Django static files
    location /static/ {
        alias /var/www/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin *;
    }

    # Serve Django media files
    location /media/ {
        alias /var/www/media/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin *;
    }

    # Health check
    location /health {
        access_log off;
        return 200 "static files server healthy\n";
        add_header Content-Type text/plain;
    }

    # Default response
    location / {
        return 404 "Static files server - use /static/ or /media/\n";
    }
} 